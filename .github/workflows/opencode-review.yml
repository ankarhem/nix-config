name: opencode

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      github.event_name == 'pull_request' ||
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install oh-my-openagent plugin
        run: bunx oh-my-opencode install --no-tui --claude=no --gemini=no --copilot=no --openai=no --opencode-go=no --opencode-zen=no --zai-coding-plan=yes --kimi-for-coding=no --vercel-ai-gateway=no --skip-auth

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          PR_CONTEXT: ${{ steps.pr_context.outputs.content }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          REPO_NAME: ${{ github.event.repository.name }}
        with:
          model: zai-coding-plan/glm-5.1
          share: false
          prompt: |
            Review this PR carefully and stay grounded in the actual diff and surrounding context.

            Gather context from the PR using gh cli:

            gh pr view ${PR_NUMBER} --title,description,comments
            gh api repos/${REPO_NAME}/pulls/${PR_NUMBER}/comments
            gh api repos/${REPO_NAME}/pulls/${PR_NUMBER}/reviews

            Spawn atleast 3 subagents or more if needed.

            Evaluate from these perspectives:
            - correctness
            - maintainability
            - coupling and cohesion
            - long-term scalability
            - security
            - reliability and error handling
            - race conditions and concurrency issues
            - null/undefined handling
            - boundary conditions and off-by-one errors
            - broken edge cases
            - consistency with code standards and local patterns

            Important guidance:
            - Do not only inspect the changed lines; consider impacted call sites, adjacent logic, and likely interactions with the surrounding code.
            - Do not invent issues without evidence from the PR or provided context.
            - Prioritize high-signal findings over exhaustive nitpicks.
            - Distinguish clearly between blocking issues and non-blocking suggestions.
            - Prefer concrete, minimal fixes over broad rewrites.
            - Use GitHub suggestion blocks only when proposing a small, directly applicable code change.
            - Do not reiterate issues that have been flagged during previous runs.

            For each finding, provide:
            1. Severity: blocking / non-blocking
            2. Location: file and line or affected area
            3. Problem: what is wrong
            4. Why it matters: user, correctness, operability, maintenance, or security impact
            5. Fix: a concrete recommendation
            6. Suggested patch: include a GitHub suggestion block when feasible

            Also call out:
            - missing tests or weak test coverage
            - simpler or safer designs when clearly justified

            Output rules:
            - If there are no meaningful issues, say "LGTM" and briefly mention what you checked.
            - Do not pad the review with trivial style comments unless they affect readability,
